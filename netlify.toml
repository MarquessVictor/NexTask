[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — qualquer rota desconhecida cai no index.html
# pra que o React Router resolva client-side (sem isso, F5 em /tarefas dá 404)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache longo pros assets versionados do Vite (têm hash no nome, então é seguro)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers de segurança básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
